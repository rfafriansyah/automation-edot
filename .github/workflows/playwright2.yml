name: Playwright Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================
  # GROUP: build
  # ============================================
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps

  # ============================================
  # GROUP: test
  # ============================================
  colon-test:
    name: colon-test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run colon-test

  slash-test:
    name: slash-test
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]           # ← ini yang bikin slash-test 1/3, 2/3, 3/3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run slash-test shard ${{ matrix.shard }}
        run: npm run slash-test -- --shard=${{ matrix.shard }}/3
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-slash-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

  space-test:
    name: space-test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run space-test

  # ============================================
  # GROUP: deploy
  # ============================================
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [colon-test, slash-test, space-test]
    if: always()
    steps:
      - run: echo "Deploying..."