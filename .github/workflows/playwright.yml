name: Playwright Pipeline with Stages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

  # ============================================
  # STAGE 2 - TEST (parallel, tunggu stage 1)
  # ============================================
  test-login:
    name: 🧪 Test Login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run run-sales
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-login
          path: playwright-report/
          retention-days: 30

  test-sales:
    name: 🧪 Test Sales
    runs-on: ubuntu-latest
    needs: test-login
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run run-sales
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-sales
          path: playwright-report/
          retention-days: 30

  dashboard:
    name: 🧪 Test Dashboard
    runs-on: ubuntu-latest
    needs: test-sales
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run run-sales
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-dashboard
          path: playwright-report/
          retention-days: 30

  # ============================================
  # STAGE 3 - REPORT (tunggu semua test selesai)
  # ============================================
  report:
    name: 📊 Generate Report
    runs-on: ubuntu-latest
    needs: [test-login, test-sales, dashboard] # ← tunggu stage 2 selesai
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Display report summary
        run: |
          echo "===== TEST SUMMARY ====="
          echo "Login   : ${{ needs.test-login.result }}"
          echo "Sales   : ${{ needs.test-sales.result }}"
          echo "Dashboard: ${{ needs.test-dashboard.result }}"

      - uses: actions/upload-artifact@v4
        with:
          name: all-reports-combined
          path: all-reports/
          retention-days: 30

  # ============================================
  # STAGE 4 - DEPLOY (hanya jika semua lulus)
