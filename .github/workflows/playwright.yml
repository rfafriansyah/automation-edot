name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================
  # STAGE 1 - INSTALL
  # ============================================
  install:
    name: 🔧 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

  # ============================================
  # STAGE 2 - TEST PARALEL (tunggu install)
  # ============================================
  test-login:
    name: 🧪 Test Login
    runs-on: ubuntu-latest
    needs: install                # ← tunggu install selesai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run run-login
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-login
          path: playwright-report/
          retention-days: 30

  test-sales:
    name: 🧪 Test Sales
    runs-on: ubuntu-latest
    needs: install                # ← tunggu install selesai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run run-sales
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-sales
          path: playwright-report/
          retention-days: 30

  test-dashboard:
    name: 🧪 Test Dashboard
    runs-on: ubuntu-latest
    needs: install                # ← tunggu install selesai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run dashboard-quotation
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-dashboard
          path: playwright-report/
          retention-days: 30

  # ============================================
  # STAGE 3 - REPORT (tunggu semua test)
  # ============================================
  generate-report:
    name: 📊 Generate Report
    runs-on: ubuntu-latest
    needs: [test-login, test-sales, test-dashboard]  # ← tunggu semua test
    if: always()                  # ← tetap jalan walau ada test gagal
    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports/

      - name: Show test summary
        run: |
          echo "===== TEST SUMMARY ====="
          echo "Test Login    : ${{ needs.test-login.result }}"
          echo "Test Sales    : ${{ needs.test-sales.result }}"
          echo "Test Dashboard: ${{ needs.test-dashboard.result }}"

      - uses: actions/upload-artifact@v4
        with:
          name: all-reports-combined
          path: all-reports/
          retention-days: 30

  # ============================================
  # STAGE 4 - DEPLOY (tunggu report)
  # ============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [generate-report]      # ← tunggu report selesai
    if: always()
    steps:
      - name: Deploy
        run: echo "Deploying..."